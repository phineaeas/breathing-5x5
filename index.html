<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1"
    />
    <meta name="theme-color" content="#0e1116" />
    <title>Дыхание · 5–5</title>
    <meta
      name="description"
      content="Спокойный дыхательный метроном: вдох 5 секунд, выдох 5 секунд."
    />

    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link
      href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=general-sans@400,500,600&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='10' fill='none' stroke='%23d8b27a' stroke-width='2'/><circle cx='16' cy='16' r='4' fill='%23d8b27a'/></svg>" />

    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a class="skip" href="#main">Перейти к контенту</a>

    <main id="main" class="app" aria-live="polite">
      <header class="topbar">
        <div class="brand" aria-label="Дыхание">
          <svg
            class="logo"
            viewBox="0 0 32 32"
            aria-hidden="true"
            focusable="false"
          >
            <circle
              cx="16"
              cy="16"
              r="10"
              fill="none"
              stroke="currentColor"
              stroke-width="1.25"
              opacity=".55"
            />
            <circle
              cx="16"
              cy="16"
              r="5"
              fill="none"
              stroke="currentColor"
              stroke-width="1.25"
            />
            <circle cx="16" cy="16" r="1.4" fill="currentColor" />
          </svg>
          <span class="brand-name">Дыхание</span>
        </div>
        <div class="pattern" aria-label="Ритм">
          <span>5</span><span class="dot" aria-hidden="true">·</span><span>5</span>
        </div>
      </header>

      <section class="stage" aria-label="Дыхательный метроном">
        <div class="orb-wrap" aria-hidden="true">
          <div class="halo"></div>
          <div class="orb" id="orb">
            <div class="orb-core"></div>
            <svg class="ring" viewBox="0 0 220 220" aria-hidden="true">
              <circle
                class="ring-track"
                cx="110"
                cy="110"
                r="104"
              />
              <circle
                id="ringProgress"
                class="ring-progress"
                cx="110"
                cy="110"
                r="104"
              />
            </svg>
          </div>
        </div>

        <div class="readout">
          <div class="phase" id="phase" data-testid="text-phase">Готово</div>
          <div class="count" id="count" data-testid="text-count">5</div>
          <div class="hint" id="hint">Нажмите «Начать»</div>
        </div>
      </section>

      <section class="meta" aria-label="Статистика сессии">
        <div class="meta-card">
          <div class="meta-label">Циклы</div>
          <div class="meta-value" id="cycles" data-testid="text-cycles">0</div>
        </div>
        <div class="meta-divider" aria-hidden="true"></div>
        <div class="meta-card">
          <div class="meta-label">Время</div>
          <div class="meta-value" id="elapsed" data-testid="text-elapsed">00:00</div>
        </div>
      </section>

      <section class="controls" aria-label="Управление">
        <button
          id="btnPrimary"
          class="btn btn-primary"
          type="button"
          data-testid="button-primary"
          aria-label="Начать"
        >
          <span class="btn-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20">
              <path d="M8 5v14l11-7z" fill="currentColor" />
            </svg>
          </span>
          <span class="btn-label" id="btnPrimaryLabel">Начать</span>
        </button>

        <button
          id="btnReset"
          class="btn btn-ghost"
          type="button"
          data-testid="button-reset"
          aria-label="Сброс"
        >
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path
              d="M12 5V2L7 6l5 4V7a5 5 0 1 1-5 5H5a7 7 0 1 0 7-7z"
              fill="currentColor"
            />
          </svg>
          <span>Сброс</span>
        </button>
      </section>

      <section class="toggles" aria-label="Настройки">
        <button
          id="btnSound"
          class="toggle"
          type="button"
          aria-pressed="false"
          data-testid="button-sound"
        >
          <span class="toggle-dot" aria-hidden="true"></span>
          <span class="toggle-label">
            <span class="toggle-title">Включить звук</span>
            <span class="toggle-sub">Мягкие тоны на фазах</span>
          </span>
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" class="toggle-icon">
            <path d="M5 9v6h4l5 4V5L9 9H5zm11.5 3a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4z" fill="currentColor"/>
          </svg>
        </button>

        <button
          id="btnVibe"
          class="toggle"
          type="button"
          aria-pressed="false"
          data-testid="button-vibration"
        >
          <span class="toggle-dot" aria-hidden="true"></span>
          <span class="toggle-label">
            <span class="toggle-title">Вибрация</span>
            <span class="toggle-sub" id="vibeSub">Лёгкий импульс на смене фазы</span>
          </span>
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" class="toggle-icon">
            <path d="M2 9v6h2V9H2zm18 0v6h2V9h-2zM6 5h12v14H6V5z" fill="currentColor"/>
          </svg>
        </button>
      </section>

      <footer class="foot">
        <span>Дышите медленно. 5 секунд вдох, 5 секунд выдох.</span>
      </footer>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
